    나만 없어서 당황. 유튜브 보고 이것저것 사봤는데 뭐가 뭔지 모르겠고,
    10스텝 루틴이 좋다는 말에 다 사봤다가 트러블만 남. 결국 선배가
    "클렌징 밤 하나만 제대로 써봐"라고 해서 클린잇제로 오리지널 사봤는데
    이게 진짜 좋더라. 여기서부터 하나씩 추가하는 중.
  turning_point: "선배가 '클렌징 밤 하나만 제대로 써봐'라고 한 그 한마디"
